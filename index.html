<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Скачать APK</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --danger: #ef4444;
      --border: #1f2937;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #0b1220 0%, var(--bg) 100%);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
    }
    .file-box {
      padding: 14px 16px;
      border-radius: 14px;
      background: #0b1324;
      border: 1px solid #243041;
      margin-bottom: 18px;
      font-size: 15px;
      word-break: break-all;
    }
    .status {
      min-height: 24px;
      margin-bottom: 16px;
      font-size: 14px;
      color: var(--muted);
    }
    .status.ok { color: #86efac; }
    .status.error { color: #fca5a5; }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    button, a.secondary {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform .15s ease, background .15s ease, opacity .15s ease;
    }
    button {
      background: var(--accent);
      color: #052e16;
      min-width: 220px;
    }
    button:hover { background: var(--accent-hover); transform: translateY(-1px); }
    button:disabled {
      background: #334155;
      color: #94a3b8;
      cursor: not-allowed;
      transform: none;
    }
    a.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid #334155;
    }
    a.secondary:hover { background: rgba(255,255,255,0.04); }
    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Скачать APK</h1>
    <p>Нажми на кнопку ниже. Перед скачиванием страница попробует проверить, доступен ли файл.</p>

    <div class="file-box">Файл: <strong>Контроль здоровья-0.1.0.apk</strong></div>
    <div id="status" class="status">Проверка файла ещё не выполнялась.</div>

    <div class="actions">
      <button id="downloadBtn" type="button">Проверить и скачать</button>
      <a class="secondary" href="Контроль здоровья-0.1.0.apk" download>Прямая ссылка</a>
    </div>

    <div class="hint">
      Если автоматическая проверка не сработает из-за ограничений окружения, можно использовать прямую ссылку.
    </div>
  </main>

  <script>
    const fileName = 'Контроль здоровья-0.1.0.apk';
    const statusEl = document.getElementById('status');
    const downloadBtn = document.getElementById('downloadBtn');

    async function fileExists(url) {
      try {
        const response = await fetch(url, { method: 'HEAD' });
        return response.ok;
      } catch (e) {
        return false;
      }
    }

    async function downloadFile(url, filename) {
      const response = await fetch(url);
      if (!response.ok) throw new Error('Файл недоступен');
      const blob = await response.blob();
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(link.href), 1000);
    }

    downloadBtn.addEventListener('click', async () => {
      downloadBtn.disabled = true;
      statusEl.className = 'status';
      statusEl.textContent = 'Проверяю наличие файла...';

      const exists = await fileExists(fileName);
      if (!exists) {
        statusEl.className = 'status error';
        statusEl.textContent = 'Файл не найден или недоступен по этому пути.';
        downloadBtn.disabled = false;
        return;
      }

      statusEl.className = 'status ok';
      statusEl.textContent = 'Файл найден. Начинаю скачивание...';

      try {
        await downloadFile(fileName, fileName);
        statusEl.className = 'status ok';
        statusEl.textContent = 'Скачивание запущено.';
      } catch (e) {
        statusEl.className = 'status error';
        statusEl.textContent = 'Не удалось скачать файл автоматически. Используй прямую ссылку ниже.';
      } finally {
        downloadBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
